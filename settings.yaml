# ============================================================
#   ASISTENTE TRADING v2 — CONFIGURACIÓN PRINCIPAL
# ============================================================

trading:
  symbol: "BTC/USDT"
  timeframe: "15m"            # Cambiado de 1h a 15m — más señales por día
  capital: 1000.0             # Capital PAPER para mostrar a inversores
  mode: "paper"               # Nunca cambiar a "live" sin meses de paper exitoso

risk:
  max_position_size: 0.30     # 30% del capital por operación
  stop_loss: 0.02             # Fallback fijo si ATR no disponible
  take_profit: 0.04           # Fallback fijo si ATR no disponible
  atr_sl_multiplier: 1.5      # SL = 1.5 × ATR(14) — adapta a volatilidad
  atr_tp_multiplier: 3.0      # TP = 3.0 × ATR(14) — ratio riesgo/recompensa 1:2
  trailing_breakeven_pct: 1.5 # Mover SL a breakeven cuando PnL >= 1.5%
  trailing_activate_pct: 3.0  # Activar trailing dinámico cuando PnL >= 3.0%
  trailing_distance_pct: 1.5  # SL trailing = peak × (1 - 1.5%)
  daily_loss_limit: 0.05      # Detiene bot si pierde 5% en el día
  max_drawdown: 0.20          # Detiene bot si portfolio cae 20% desde pico
  max_open_positions: 1

model:
  retrain_days: 14            # Reentrenar cada 2 semanas (15m necesita más frecuencia)
  prediction_threshold: 0.55  # Bajado de 0.65 — modelo ~50% acc necesita umbral más bajo
  target_threshold: 0.002     # 0.2% — movimiento mínimo válido para señal
  historical_days: 60         # 60 días × 96 velas/día = ~5,760 velas de 15m

exchange:
  name: "binance"
  testnet: true
  api_key: ""
  api_secret: ""
  commission: 0.001           # 0.1% por operación Binance spot

telegram:
  token: ""
  chat_id: ""
  enabled: false

logging:
  level: "INFO"
  file: "logs/trading.log"
